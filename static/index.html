<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvia Video</title>
<style>
  :root {
    --bg: #07070f; --bg-deep: #040408;
    --surface: #0f0f1a; --surface-el: #14141f; --surface-hover: #1a1a28;
    --text: #e2e2f0; --text-muted: rgba(200,200,230,.5);
    --border: rgba(255,255,255,.06); --border-strong: rgba(255,255,255,.10);
    --green: #00ff88; --green-soft: rgba(0,255,136,.12);
    --red: #ff3355; --cyan: #00bbff; --cyan-soft: rgba(0,187,255,.12);
    --purple: #8866ff; --orange: #ff8800; --amber: #ffaa00;
    --accent: #ff2244; --accent-soft: rgba(255,34,68,.12);
    --shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  
  [data-theme="light"] {
    --bg: #f2f2f7; --bg-deep: #e5e5ea;
    --surface: #ffffff; --surface-el: #f9f9fb; --surface-hover: #f0f0f5;
    --text: #1c1c1e; --text-muted: rgba(28,28,30,.55);
    --border: rgba(0,0,0,.08); --border-strong: rgba(0,0,0,.15);
    --green: #00b060; --green-soft: rgba(0,176,96,.12);
    --red: #e02040; --cyan: #0088cc; --cyan-soft: rgba(0,136,204,.12);
    --purple: #7744ee; --orange: #ee6600; --amber: #dd9900;
    --accent: #e02040; --accent-soft: rgba(224,32,64,.12);
    --shadow: 0 10px 40px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s; }
  body {
    background: var(--bg); color: var(--text);
    background-image: radial-gradient(ellipse at 50% 0%, var(--accent-soft) 0%, transparent 60%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 26px 20px 70px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  h1 {
    font-size: 30px; letter-spacing: 1.5px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--orange) 50%, var(--accent) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .by { font-size: 12px; color: var(--text-muted); }
  .by a { color: var(--accent); text-decoration: none; }
  .chip { margin-left: auto; font-size: 12px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }
  .chip b { color: var(--green); }

  .colunas { display: grid; grid-template-columns: 360px 1fr; gap: 18px; align-items: start; }
  @media (max-width: 860px) { .colunas { grid-template-columns: 1fr; } }
  .painel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; }

  /* biblioteca */
  .busca { width: 100%; background: var(--surface-el); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-size: 14px; margin-bottom: 10px; }
  .busca:focus, textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); }
  .filtros { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filtro { font-size: 12px; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface-el); color: var(--text-muted); cursor: pointer; }
  .filtro.ativo { background: var(--accent-soft); border-color: var(--accent); color: var(--text); }
  .lista-vozes { display: flex; flex-direction: column; gap: 8px; max-height: 46vh; overflow-y: auto; padding-right: 4px; }
  .lista-vozes::-webkit-scrollbar { width: 6px; }
  .lista-vozes::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .voz { display: flex; align-items: center; gap: 10px; background: var(--surface-el); border: 1px solid var(--border); border-radius: 12px; padding: 9px 12px; cursor: pointer; transition: .15s; }
  .voz:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .voz.ativa { border-color: var(--green); background: var(--green-soft); }
  .avatar { width: 34px; height: 34px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #04040a; }
  .voz-info { min-width: 0; flex: 1; }
  .voz-nome { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .voz-tags { font-size: 11px; color: var(--text-muted); }
  .genero { font-size: 10px; padding: 1px 7px; border-radius: 8px; flex: none; }
  .genero.F { background: var(--accent-soft); color: #ff7799; }
  .genero.M { background: var(--cyan-soft); color: var(--cyan); }
  .icone { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; width: 26px; height: 26px; cursor: pointer; font-size: 12px; flex: none; }
  .icone:hover { border-color: var(--border-strong); color: var(--text); }
  .icone.play { color: var(--green); }
  .icone.fav.on { color: var(--amber); border-color: rgba(255,170,0,.4); }
  .icone.del:hover { color: var(--red); }

  .nova-voz { border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .nova-voz .linha1 { display: flex; gap: 8px; }
  .nova-voz input[type=text] { flex: 1; background: var(--surface-el); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px 12px; font-size: 13px; min-width: 0; }
  .nova-voz select { background: var(--surface-el); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px; font-size: 13px; }
  .botoes-voz { display: flex; gap: 8px; }
  .btn { background: var(--surface-el); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; font-size: 13px; cursor: pointer; transition: .15s; flex: 1; }
  .btn:hover { border-color: var(--border-strong); background: var(--surface-hover); }
  .btn.rec.gravando { background: var(--accent); border-color: var(--accent); color: #fff; animation: pulsa 1s infinite; }
  @keyframes pulsa { 50% { opacity: .55; } }
  .dica { font-size: 11px; color: var(--text-muted); }

  /* estúdio */
  textarea { width: 100%; min-height: 170px; background: var(--surface-el); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 14px; font-size: 15px; line-height: 1.55; resize: vertical; }
  .voz-selecionada { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
  .voz-selecionada b { color: var(--green); }
  .ajustes { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
  .slider { display: flex; align-items: center; gap: 9px; font-size: 12px; color: var(--text-muted); }
  input[type=range] { accent-color: var(--accent); width: 130px; }
  .contador { margin-left: auto; font-size: 12px; color: var(--text-muted); }
  .rodape-gerar { display: flex; align-items: center; gap: 14px; margin-top: 16px; flex-wrap: wrap; }
  .principal { background: var(--green); border: none; color: #04140a; font-weight: 800; font-size: 15px; padding: 13px 30px; border-radius: 12px; cursor: pointer; letter-spacing: .5px; }
  .principal:hover { filter: brightness(1.15); }
  .principal:disabled { background: #1c3529; color: #5d7a68; cursor: wait; }
  .statusger { font-size: 13px; color: var(--text-muted); }
  .statusger.erro { color: var(--red); }
  .barra { height: 5px; background: var(--surface-el); border-radius: 3px; overflow: hidden; flex: 1; min-width: 120px; display: none; }
  .barra > div { height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); width: 0%; transition: width .4s; }
  audio { width: 100%; margin-top: 14px; }
  .saidas { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
  .saida { display: flex; align-items: center; gap: 10px; background: var(--surface-el); border: 1px solid var(--border); border-radius: 10px; padding: 8px 13px; font-size: 12.5px; }
  .saida a { color: var(--green); text-decoration: none; margin-left: auto; }
  .oculto { display: none; }
  
  .btn-tema { 
    background: var(--surface); border: 1px solid var(--border); color: var(--text); 
    border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; 
    justify-content: center; cursor: pointer; margin-left: 10px; font-size: 14px;
  }
  .btn-tema:hover { background: var(--surface-hover); border-color: var(--border-strong); }

</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Salvia Video</h1>
    <div class="by">Estúdio de voz IA 100% local</div>
    <div class="chip" id="chip">conectando...</div>
    <button class="btn-tema" id="btnTema" title="Alternar tema">🌙</button>
  </header>

  <div class="colunas">
    <div class="painel">
      <h2>Biblioteca de vozes <span id="qtd"></span></h2>
      <input class="busca" id="busca" type="text" placeholder="Buscar voz...">
      <div class="filtros">
        <div class="filtro ativo" data-f="todos">Todos</div>
        <div class="filtro" data-f="fav">★ Favoritas</div>
        <div class="filtro" data-f="F">Femininas</div>
        <div class="filtro" data-f="M">Masculinas</div>
      </div>
      <div class="lista-vozes" id="vozes"></div>
      <div class="nova-voz">
        <div class="linha1">
          <input type="text" id="nomeVoz" placeholder="Nome da nova voz">
          <select id="generoVoz"><option value="">Gênero</option><option value="F">Feminina</option><option value="M">Masculina</option></select>
        </div>
        <div class="botoes-voz">
          <button class="btn" onclick="document.getElementById('arqVoz').click()">📁 Enviar áudio</button>
          <input type="file" id="arqVoz" class="oculto" accept="audio/*">
          <button class="btn rec" id="btnRec">🎙️ Gravar</button>
        </div>
        <div class="dica">10 a 20 segundos de fala limpa bastam pra clonar qualquer voz</div>
      </div>
    </div>

    <div>
      <div class="painel">
        <h2>Estúdio</h2>
        <div class="voz-selecionada">Voz selecionada: <b id="vozAtual">Voz padrão</b></div>
        <textarea id="texto" placeholder="Cole aqui o roteiro que a voz vai narrar..."></textarea>
        <div class="ajustes">
          <div class="slider">Emoção <input type="range" id="emocao" min="0" max="100" value="50"></div>
          <div class="slider">Fidelidade <input type="range" id="fidelidade" min="0" max="100" value="50"></div>
          <div class="contador"><span id="chars">0</span> caracteres</div>
        </div>
        <div class="rodape-gerar">
          <button class="principal" id="btnGerar">▶ GERAR ÁUDIO</button>
          <div class="barra" id="barra"><div></div></div>
          <div class="statusger" id="statusger"></div>
        </div>
        <audio id="player" controls class="oculto"></audio>
      </div>

      <div class="painel" style="margin-top:18px">
        <h2>Áudios gerados</h2>
        <div class="saidas" id="saidas"><span class="dica">nenhum ainda</span></div>
      </div>
    </div>
  </div>
</div>



<script>
// Tema (Claro / Escuro)
const temaSalvo = localStorage.getItem('tema') || 'dark';
document.documentElement.setAttribute('data-theme', temaSalvo);
document.getElementById('btnTema').textContent = temaSalvo === 'light' ? '☀️' : '🌙';

document.getElementById('btnTema').onclick = () => {
  const atual = document.documentElement.getAttribute('data-theme');
  const novo = atual === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', novo);
  localStorage.setItem('tema', novo);
  document.getElementById('btnTema').textContent = novo === 'light' ? '☀️' : '🌙';
};

// links editáveis (também podem vir do manifesto da VPS, sem nova versão)
const LINK_YOUTUBE = 'https://www.youtube.com';
const LINK_DISCORD = 'https://discord.com';
let vozAtiva = '';
let vozes = [];
let filtro = 'todos';
let gravador = null;
let amostraTocando = null;

const $ = id => document.getElementById(id);
const CORES = ['#00ff88', '#00bbff', '#8866ff', '#ff8800', '#ffaa00', '#ff3355', '#ff2244'];
const corDe = nome => CORES[[...nome].reduce((a, c) => a + c.charCodeAt(0), 0) % CORES.length];

async function api(caminho, opts) {
  const r = await fetch(caminho, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.erro || 'falha na requisição');
  return j;
}

function tocarAmostra(nome, botao) {
  if (amostraTocando) { amostraTocando.pause(); amostraTocando = null; }
  const tocando = botao.textContent === '⏸';
  document.querySelectorAll('.icone.play').forEach(b => b.textContent = '▶');
  if (tocando) return;
  botao.textContent = '⏸';
  amostraTocando = new Audio('/amostra/' + encodeURIComponent(nome));
  amostraTocando.onended = () => { botao.textContent = '▶'; };
  amostraTocando.play();
}

async function carregarStatus() {
  try {
    const s = await api('/api/status');
    $('chip').innerHTML = `motor: <b>${s.device === 'cuda' ? 'NVIDIA' : s.device === 'mps' ? 'GPU Apple' : 'CPU'}</b> · modelo ${s.modelo_carregado ? 'pronto ✅' : 'carrega no 1º uso'}`;
  } catch { $('chip').textContent = 'servidor offline'; }
}

function desenharVozes() {
  const termo = $('busca').value.toLowerCase();
  const div = $('vozes');
  div.innerHTML = '';

  const padrao = document.createElement('div');
  padrao.className = 'voz' + (vozAtiva === '' ? ' ativa' : '');
  padrao.innerHTML = `<div class="avatar" style="background:linear-gradient(135deg,#fff,#ff8800,#ff2244)">SV</div>
    <div class="voz-info"><div class="voz-nome">Voz padrão</div><div class="voz-tags">nativa do motor</div></div>
    <button class="icone play" title="ouvir">▶</button>`;
  padrao.onclick = () => { vozAtiva = ''; desenharVozes(); };
  padrao.querySelector('.play').onclick = e => { e.stopPropagation(); tocarAmostra('_padrao', e.target); };
  if (filtro === 'todos' && 'voz padrão'.includes(termo)) div.appendChild(padrao);

  const filtradas = vozes.filter(v =>
    (filtro === 'todos' || (filtro === 'fav' ? v.favorita : v.genero === filtro)) &&
    (v.nome.toLowerCase().includes(termo) || (v.tags || []).join(' ').toLowerCase().includes(termo))
  );
  $('qtd').textContent = `(${vozes.length + 1})`;

  for (const v of filtradas) {
    const el = document.createElement('div');
    el.className = 'voz' + (vozAtiva === v.nome ? ' ativa' : '');
    el.innerHTML = `
      <div class="avatar" style="background:${corDe(v.nome)}">${v.nome.slice(0, 2).toUpperCase()}</div>
      <div class="voz-info">
        <div class="voz-nome">${v.nome}</div>
        <div class="voz-tags">${(v.tags || []).join(' · ') || 'voz clonada'}</div>
      </div>
      ${v.genero ? `<span class="genero ${v.genero}">${v.genero}</span>` : ''}
      <button class="icone play" title="ouvir amostra">▶</button>
      <button class="icone fav ${v.favorita ? 'on' : ''}" title="favoritar">★</button>
      <button class="icone del" title="apagar">✕</button>`;
    el.onclick = () => { vozAtiva = v.nome; $('vozAtual').textContent = v.nome; desenharVozes(); };
    el.querySelector('.play').onclick = e => { e.stopPropagation(); tocarAmostra(v.nome, e.target); };
    el.querySelector('.fav').onclick = async e => {
      e.stopPropagation();
      await api(`/api/vozes/${encodeURIComponent(v.nome)}/favorita`, { method: 'POST' });
      carregarVozes();
    };
    el.querySelector('.del').onclick = async e => {
      e.stopPropagation();
      if (!confirm(`Apagar a voz "${v.nome}"?`)) return;
      await api(`/api/vozes/${encodeURIComponent(v.nome)}`, { method: 'DELETE' });
      if (vozAtiva === v.nome) { vozAtiva = ''; $('vozAtual').textContent = 'Voz padrão'; }
      carregarVozes();
    };
    div.appendChild(el);
  }
  if (vozAtiva === '') $('vozAtual').textContent = 'Voz padrão';
}

async function carregarVozes() {
  vozes = await api('/api/vozes');
  desenharVozes();
}

$('busca').oninput = desenharVozes;
document.querySelectorAll('.filtro').forEach(f => f.onclick = () => {
  document.querySelectorAll('.filtro').forEach(x => x.classList.remove('ativo'));
  f.classList.add('ativo');
  filtro = f.dataset.f;
  desenharVozes();
});

async function enviarVoz(blob, extensao) {
  const dica = document.querySelector('.dica');
  const original = dica.textContent;
  try {
    dica.textContent = '⏳ Enviando e preparando a voz...';
    dica.style.color = 'var(--amber)';
    const nome = $('nomeVoz').value.trim() || 'minha voz';
    const fd = new FormData();
    fd.append('nome', nome);
    fd.append('genero', $('generoVoz').value);
    fd.append('arquivo', blob, 'voz.' + extensao);
    const r = await api('/api/vozes', { method: 'POST', body: fd });
    vozAtiva = r.voz;
    $('vozAtual').textContent = r.voz;
    $('nomeVoz').value = '';
    await carregarVozes();
    dica.textContent = `✅ Voz "${r.voz}" clonada e salva na biblioteca!`;
    dica.style.color = 'var(--green)';
  } catch (e) {
    dica.textContent = '❌ Falhou: ' + e.message;
    dica.style.color = 'var(--red)';
  }
  setTimeout(() => { dica.textContent = original; dica.style.color = ''; }, 6000);
}

// arrastar e soltar áudio em qualquer lugar do painel da biblioteca
const painelBib = document.querySelector('.painel');
painelBib.addEventListener('dragover', e => { e.preventDefault(); painelBib.style.borderColor = 'var(--green)'; });
painelBib.addEventListener('dragleave', () => { painelBib.style.borderColor = ''; });
painelBib.addEventListener('drop', async e => {
  e.preventDefault();
  painelBib.style.borderColor = '';
  const f = e.dataTransfer.files[0];
  if (f) await enviarVoz(f, f.name.split('.').pop());
});

$('arqVoz').onchange = async e => {
  if (e.target.files[0]) await enviarVoz(e.target.files[0], e.target.files[0].name.split('.').pop());
  e.target.value = '';
};

$('btnRec').onclick = async () => {
  const btn = $('btnRec');
  if (gravador && gravador.state === 'recording') { gravador.stop(); return; }
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  gravador = new MediaRecorder(stream);
  const partes = [];
  gravador.ondataavailable = e => partes.push(e.data);
  gravador.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    btn.classList.remove('gravando');
    btn.textContent = '🎙️ Gravar';
    await enviarVoz(new Blob(partes, { type: 'audio/webm' }), 'webm');
  };
  gravador.start();
  btn.classList.add('gravando');
  btn.textContent = '⏹ Parar';
};

$('texto').oninput = () => $('chars').textContent = $('texto').value.length;

let poll = null;
$('btnGerar').onclick = async () => {
  const texto = $('texto').value.trim();
  if (!texto) return alert('Cole o roteiro primeiro.');
  const btn = $('btnGerar'), st = $('statusger'), barra = $('barra');
  btn.disabled = true;
  st.className = 'statusger';
  barra.style.display = 'block';
  const inicio = Date.now();

  poll = setInterval(async () => {
    const s = await api('/api/status').catch(() => null);
    if (!s) return;
    const seg = Math.round((Date.now() - inicio) / 1000);
    st.textContent = `${s.etapa || 'processando'}... ${seg}s`;
    if (s.total > 0) barra.firstElementChild.style.width = Math.round(100 * s.atual / s.total) + '%';
  }, 800);

  try {
    const fd = new FormData();
    fd.append('texto', texto);
    fd.append('voz', vozAtiva);
    fd.append('emocao', $('emocao').value / 100);
    fd.append('fidelidade', $('fidelidade').value / 100);
    const r = await api('/api/gerar', { method: 'POST', body: fd });
    st.textContent = `pronto em ${Math.round((Date.now() - inicio) / 1000)}s ✅`;
    const player = $('player');
    player.src = '/audio/' + r.arquivo;
    player.classList.remove('oculto');
    player.play();
    carregarSaidas();
  } catch (e) {
    st.className = 'statusger erro';
    st.textContent = 'erro: ' + e.message;
  } finally {
    clearInterval(poll);
    btn.disabled = false;
    barra.style.display = 'none';
    barra.firstElementChild.style.width = '0%';
    carregarStatus();
  }
};

async function carregarSaidas() {
  const nomes = await api('/api/saidas');
  const div = $('saidas');
  if (!nomes.length) return;
  div.innerHTML = '';
  for (const n of nomes) {
    const el = document.createElement('div');
    el.className = 'saida';
    el.innerHTML = `🎵 ${n} <a href="/audio/${encodeURIComponent(n)}" download>⬇ baixar</a>`;
    div.appendChild(el);
  }
}


carregarStatus();
carregarVozes();
carregarSaidas();
setInterval(carregarStatus, 10000);
</script>
</body>
</html>
